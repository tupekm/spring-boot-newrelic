<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="main-page">
    <h2>Reset Password</h2>
    <p>Resetting for: <strong th:text="${email}"></strong></p>
    <form th:action="@{/reset-password}" method="post">
        <input type="hidden" name="email" th:value="${email}">
        <input type="password" name="newPassword" placeholder="New Password" required style="display:block; width:90%; margin:10px auto; padding:10px;">
        <button type="submit" style="width:90%; background:#f39c12;">Update Password</button>
    </form>
</div>
</body>
</html>
