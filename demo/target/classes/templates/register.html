<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="main-page">
        <h2>Register</h2>
        <form th:action="@{/register}" th:object="${user}" method="post">
            <input type="text" th:field="*{firstName}" placeholder="First Name" required style="display:block; width:90%; margin:10px auto; padding:10px;">
            <input type="text" th:field="*{lastName}" placeholder="Last Name" required style="display:block; width:90%; margin:10px auto; padding:10px;">
            <input type="email" th:field="*{email}" placeholder="Email" required style="display:block; width:90%; margin:10px auto; padding:10px;">
            <input type="password" th:field="*{password}" placeholder="Password" required style="display:block; width:90%; margin:10px auto; padding:10px;">
            <button type="submit" style="width:90%;">Create Account</button>
        </form>
    </div>
</body>
</html>
