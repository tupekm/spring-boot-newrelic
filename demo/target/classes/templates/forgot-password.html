<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="main-page">
    <h2>Find Your Account</h2>
    <p th:if="${error}" style="color:red" th:text="${error}"></p>
    <form th:action="@{/forgot-password}" method="post">
        <input type="email" name="email" placeholder="Enter your email" required style="display:block; width:90%; margin:10px auto; padding:10px;">
        <button type="submit" style="width:90%;">Continue</button>
    </form>
</div>
</body>
</html>
