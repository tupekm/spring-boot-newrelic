<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="main-page">
        <h2>Login</h2>
        <p th:if="${message}" style="color: green" th:text="${message}"></p>
        <p th:if="${param.error}" style="color: red">Wrong email or password. Please try again.</p>
        
        <form th:action="@{/login}" method="post">
            <input type="email" name="email" placeholder="Email" required style="display:block; width:90%; margin:10px auto; padding:10px;">
            <input type="password" name="password" placeholder="Password" required style="display:block; width:90%; margin:10px auto; padding:10px;">
            <button type="submit" style="width:90%;">Login</button>
        </form>
        <p><a href="#">Forgot Password?</a></p>
    </div>
</body>
</html>
